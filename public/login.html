<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — OT Tracker</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo">OT</div>
        <div class="auth-title-wrap">
          <p class="eyebrow">OT Tracker</p>
          <h1 class="auth-title">Đăng nhập để bắt đầu</h1>
        </div>
      </div>

      <p id="authMessage" class="auth-message subtle">Đang kiểm tra phiên đăng nhập...</p>

      <div id="configHint" class="auth-warning" hidden>
        Cập nhật biến môi trường frontend trước khi đăng nhập.
      </div>

      <!-- User info sau khi đăng nhập -->
      <section id="authDetails" class="auth-user-card" hidden>
        <div class="auth-user-avatar-wrap">
          <img id="authAvatar" class="auth-avatar" src="" alt="" hidden />
          <div id="authAvatarFallback" class="auth-avatar auth-avatar--fallback" aria-hidden="true"></div>
        </div>
        <div class="auth-user-info">
          <strong id="authEmail" class="auth-user-name"></strong>
          <p id="authMeta" class="hint auth-user-meta"></p>
        </div>
      </section>

      <div class="auth-actions">
        <button id="loginButton" class="primary auth-google-btn" type="button">
          <svg class="auth-google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
              d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
              fill="#4285F4" />
            <path
              d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
              fill="#34A853" />
            <path
              d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"
              fill="#FBBC05" />
            <path
              d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"
              fill="#EA4335" />
          </svg>
          Đăng nhập với Google
        </button>
        <button id="continueButton" class="secondary" type="button" hidden>Vào OT Tracker →</button>
        <button id="signOutButton" class="ghost" type="button" hidden>Đăng xuất</button>
      </div>
    </section>
  </main>

  <script src="/api/auth-config.js"></script>
  <script type="module" src="./login.js"></script>
</body>

</html>
